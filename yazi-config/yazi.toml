# ══════════════════════════════════════════════════════════
# Yazi - Terminal File Manager Configuration
# ══════════════════════════════════════════════════════════

[manager]
ratio          = [1, 3, 4]  # parent : current : preview
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = true
show_symlink   = true

[preview]
max_width  = 1000
max_height = 1000
cache_dir  = ""
tab_size   = 2

[plugin]
prepend_previewers = [
  { url = "*.md", run = "glow" },
]

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Neovim" },
]
open = [
  { run = 'open "$@"', desc = "System Open" },
]
reveal = [
  { run = 'open -R "$@"', desc = "Reveal in Finder" },
]

[open]
rules = [
  { mime = "text/*",               use = "edit" },
  { mime = "application/json",     use = "edit" },
  { mime = "*/javascript",         use = "edit" },
  { mime = "*/typescript",         use = "edit" },
  { mime = "*/xml",                use = "edit" },
  { mime = "image/*",              use = "open" },
  { mime = "video/*",              use = "open" },
  { mime = "audio/*",              use = "open" },
  { mime = "application/pdf",      use = "open" },
  { mime = "application/zip",      use = "open" },
  { mime = "*",                    use = "edit" },
]
